<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Registro Territori</title>
    <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#B0C4DE">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="icon" type="image/png" href="icona-192.png">
<link rel="apple-touch-icon" href="icona-192.png">

<meta property="og:type" content="website">
<meta property="og:title" content="Registro Percorrenza Territori">
<meta property="og:description" content="Gestione e consultazione dei territori.">
<meta property="og:url" content="https://asarritzu-boop.github.io/RegistroTerritori/">
<meta property="og:image" content="https://asarritzu-boop.github.io/RegistroTerritori/icona-512.png">
<meta property="og:image:width" content="512">
<meta property="og:image:height" content="512">
<meta property="og:image:type" content="image/png">
<meta property="og:image:alt" content="Registro Territori">
    <meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Registro Territori">
<meta name="twitter:description" content="Gestione e consultazione dei territori per la predicazione.">
<meta name="twitter:image" content="https://asarritzu-boop.github.io/RegistroTerritori/icona-512.png">
  
    <style>

        :root {
            --primary-bg: #B0C4DE;
            --dark-blue: #1F3A52;
            --white: #ffffff;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--dark-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header e Titolo */
        header {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Menu a sinistra */
        .menu-container {
            position: absolute;
            left: 20px;
        }

        .menu-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--dark-blue);
            cursor: pointer;
            padding: 5px;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 40px;
            left: 0;
            background-color: var(--white);
            min-width: 180px;
            box-shadow: var(--shadow);
            border-radius: 8px;
            z-index: 1000;
            overflow: hidden;
        }

        .dropdown-menu a {
        color: #1F3A52; /* Blu scuro dell'icona */
        padding: 12px 16px;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 10px; /* Spazio tra icona e testo */
        font-size: 0.8rem;
        font-weight: 500;
        border-bottom: 1px solid #eee;
    }

    /* Colore Rosso per Logout ed Elimina */
    .dropdown-menu a.danger {
        color: #d9534f;
    }

    .dropdown-menu a:hover {
        background-color: #f1f1f1;
    }

    .dropdown-menu a:last-child {
        border-bottom: none;
    }

    /* Icone leggermente più grandi */
    .menu-icon {
        font-size: 1.0rem;
        width: 25px;
        text-align: center;
    }

        .show { display: block; }

        /* Griglia Pulsanti Principali */
        .action-bar {
            width: 90%;
            max-width: 600px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            padding: 10px;
        }

        .btn-main {
            background-color: var(--dark-blue);
            color: var(--white);
            border: none;
            padding: 15px 10px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .btn-main:active {
            transform: scale(0.95);
            background-color: #2c5273;
        }

        /* Desktop Adjustment */
        @media (min-width: 768px) {
            h1 { font-size: 2rem; }
            .btn-main:hover { background-color: #2c5273; }
        }

        /* Area Contenuto (per usi futuri) */
        main {
            width: 90%;
            max-width: 800px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="menu-container">
    <button class="menu-btn" onclick="toggleMenu()" aria-label="Menu">☰</button>
    <div id="myDropdown" class="dropdown-menu">
        <a href="#"><span class="menu-icon">📤</span> Esporta Backup</a>
        <a href="#"><span class="menu-icon">📥</span> Importa Backup</a>
        <a href="#"><span class="menu-icon">☁️</span> Salva in Cloud</a>
        <a href="#"><span class="menu-icon">🔄</span> Ripristino da Cloud</a>
        <hr style="margin:0; border:0; border-top:1px solid #eee;">
        <a href="#" class="danger"><span class="menu-icon">🚪</span> Logout</a>
        <a href="#" class="danger"><span class="menu-icon">🗑️</span> Elimina Utente</a>
    </div>
</div>
        <h1>Registro Territori</h1>
    </header>

    <nav class="action-bar">
        <button class="btn-main">+ Territorio</button>
        <button class="btn-main">Statistiche</button>
        <button class="btn-main">Vai al Registro</button>
    </nav>

    <main>
        </main>

    <script>
        // Funzione per mostrare/nascondere il menu
        function toggleMenu() {
            document.getElementById("myDropdown").classList.toggle("show");
        }

        // Chiude il menu se l'utente clicca fuori
        window.onclick = function(event) {
            if (!event.target.matches('.menu-btn')) {
                var dropdowns = document.getElementsByClassName("dropdown-menu");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registrato!', reg))
                    .catch(err => console.log('Errore SW:', err));
            });
        }
    </script>

</body>
</html>
